<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Губернатор Омской области на ПМЭФ-2026">
    <meta property="og:description" content="Следите за шахматной партией губернатора в прямом эфире! #ОмскШахматнаяСтолица">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chess.komaru.ru">
    <meta property="og:image" content="https://chess.komaru.ru/preview.jpg">

    <title>ПМЭФ 2026: Прямой эфир</title>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#2563eb' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="./style/styles.css">
    
    <style>
        .in-check {
            background-color: rgba(239, 68, 68, 0.6) !important;
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.9) !important;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans">
    
    <nav class="relative z-50 bg-white dark:bg-gray-800 shadow-md py-4 transition-colors duration-300">
        <div class="max-w-7xl mx-auto w-full px-4 lg:px-8 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="copyTag()" class="text-left group p-2 -ml-2 rounded-xl transition-colors duration-200 select-none cursor-pointer" title="Нажмите, чтобы скопировать тег">
                    <h1 class="font-bold text-xl tracking-wide group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">ПМЭФ-2026</h1>
                    <p id="hashtag-text" class="text-sm gradient-tag tracking-wider transition-all duration-300">#ОмскШахматнаяСтолица</p>
                </button>
            </div>
            <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                <svg id="theme-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </nav>

    <div id="game-overlay" class="fixed inset-0 z-40 bg-white/60 dark:bg-gray-900/70 backdrop-blur-xl flex flex-col justify-center items-center transition-all duration-500 opacity-100 pointer-events-auto px-4">
        <div class="mt-16 w-full max-w-2xl min-h-[300px] p-8 md:p-12 bg-white dark:bg-gray-800 rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-700 flex flex-col justify-center items-center text-center">
            <svg class="w-20 h-20 mb-6 text-blue-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">Трансляция ещё не начата</h2>
            <p class="text-lg text-gray-500 dark:text-gray-400 mb-8 max-w-lg">
                Ожидайте начала партии.
            </p>
        </div>
    </div>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 lg:p-8 flex flex-col lg:flex-row items-start gap-6 relative z-10">        
        <div class="w-full lg:w-2/3 flex flex-col bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-700">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h2 class="font-semibold flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span> Прямой эфир
                </h2>
            </div>
            <div class="relative w-full aspect-video bg-black">
                <iframe
                    id="vk-player"
                    class="absolute inset-0 w-full h-full border-0"
                    src=""
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;"
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="w-full lg:w-1/3 flex flex-col gap-6">
            <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 flex-shrink-0">
                <div id="board" class="w-full mx-auto aspect-square"></div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 flex flex-col overflow-hidden max-h-[500px]">
                <div class="p-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800">
                    <h3 class="font-semibold text-sm">История ходов</h3>
                    <div class="flex gap-2">
                        <button onclick="shareGame()" class="flex items-center gap-1 text-xs px-3 py-1 bg-sky-100 text-sky-700 dark:bg-sky-900 dark:text-sky-200 rounded hover:bg-sky-200 dark:hover:bg-sky-800 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4v4c-6.575 1.028 -9.02 6.788 -10 12c-.037 .206 5.384 -5.962 10 -6v4l8 -7l-8 -7z"/></svg>
                            Поделиться
                        </button>

                        <button onclick="downloadPGN()" class="flex items-center gap-1 text-xs px-3 py-1 bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-200 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><path d="M7 11l5 5l5 -5"/><path d="M12 4l0 12"/></svg>
                            PGN
                        </button>
                    </div>
                </div>
                
                <div id="move-history" class="overflow-y-auto custom-scroll flex-grow p-2 text-sm font-mono">
                    <p class="text-center text-gray-400 mt-4">Ожидание первого хода...</p>
                </div>
            </div>

        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        themeBtn.addEventListener('click', () => {
            htmlEl.classList.toggle('dark');
            localStorage.theme = htmlEl.classList.contains('dark') ? 'dark' : 'light';
        });

        const board = Chessboard('board', {
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            position: 'start',
            showNotation: true
        });
        
        $(window).resize(board.resize);

        let currentPGNString = ""; 

        function parsePGNAndRender(pgnStr) {
            if (!pgnStr || pgnStr.trim() === "") return;
            if (currentPGNString === pgnStr) return;

            const isFirstLoad = currentPGNString === "";

            currentPGNString = pgnStr; 
            const historyBox = document.getElementById('move-history');
            
            const isScrolledToBottom = historyBox.scrollHeight - historyBox.clientHeight <= historyBox.scrollTop + 10;
            const previousScrollTop = historyBox.scrollTop;

            const cleaned = cleanPGN(pgnStr);
            const cleanMoves = cleaned
                .replace('*', '')
                .replace(/\d+\./g, '')
                .trim()
                .split(/\s+/)
                .filter(m => m !== '');
            
            let html = '';
            for(let i = 0; i < cleanMoves.length; i += 2) {
                const moveNum = (i / 2) + 1;
                const whiteMove = cleanMoves[i];
                const blackMove = cleanMoves[i+1] || '';
                
                html += `
                    <div class="flex px-2 py-1.5 rounded even:bg-gray-100 dark:even:bg-gray-700/50">
                        <div class="w-8 text-gray-400 text-right pr-2">${moveNum}.</div>
                        <div class="flex-1 font-semibold text-gray-800 dark:text-gray-200">${whiteMove}</div>
                        <div class="flex-1 font-semibold text-gray-800 dark:text-gray-200">${blackMove}</div>
                    </div>
                `;
            }
            historyBox.innerHTML = html;
            
            if (isFirstLoad || isScrolledToBottom) {
                setTimeout(() => {
                    historyBox.scrollTop = historyBox.scrollHeight;
                }, 10);
            } else {
                historyBox.scrollTop = previousScrollTop;
            }
        }

        function highlightCheck(fen, pgn) {
            $('#board .square-55d63').removeClass('in-check');

            if (!pgn || !fen) return;

            const cleanMoves = pgn.replace(/\d+\./g, '').trim().split(/\s+/).filter(m => m !== '');
            if (cleanMoves.length === 0) return;
            
            const lastMove = cleanMoves[cleanMoves.length - 1];

            if (lastMove.includes('+') || lastMove.includes('#')) {
                const turn = fen.split(' ')[1]; 
                const kingPiece = turn === 'w' ? 'wK' : 'bK';
                
                const pos = board.position();
                for (let sq in pos) {
                    if (pos[sq] === kingPiece) {
                        $('#board .square-' + sq).addClass('in-check');
                        break;
                    }
                }
            }
        }

        function cleanPGN(pgn) {
            return pgn
                .replace(/\[.*?\]\s*/g, '')
                .replace(/\r?\n/g, ' ')
                .replace(/\b(1-0|0-1|1\/2-1\/2|\*)\b/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function vkLinkToEmbed(url) {
            if (!url) return null;
            if (url.includes("app/embed")) return url;

            const liveMatch = url.match(/vkvideo\.ru\/([^/?]+)/);
            if (liveMatch) {
                return `https://live.vkvideo.ru/app/embed/${liveMatch[1]}`;
            }

            const videoMatch = url.match(/video(-?\d+_\d+)/);
            if (videoMatch) {
                return `https://vk.com/video_ext.php?oid=${videoMatch[1].split('_')[0]}&id=${videoMatch[1].split('_')[1]}`;
            }

            return null;
        }
        async function fetchGameInfo() {
            try {
                const response = await fetch('/api/v1/game/data');
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json(); 

                const overlay = document.getElementById('game-overlay');
                const vkPlayer = document.getElementById('vk-player');

                if (data.active) {
                    overlay.classList.remove('opacity-100', 'pointer-events-auto');
                    overlay.classList.add('opacity-0', 'pointer-events-none');

                    if (data.stream_url) {
                        const embedUrl = vkLinkToEmbed(data.stream_url);
                        if (embedUrl && vkPlayer.src !== embedUrl) {
                            vkPlayer.src = embedUrl;
                        }
                    }

                    if (data.game) {
                        if (data.game.fen) {
                            board.position(data.game.fen);
                        }
                        if (data.game.pgn) {
                            parsePGNAndRender(data.game.pgn);
                            setTimeout(() => {
                                highlightCheck(data.game.fen, data.game.pgn);
                            }, 300);
                        }
                    }
                } else {
                    overlay.classList.remove('opacity-0', 'pointer-events-none');
                    overlay.classList.add('opacity-100', 'pointer-events-auto');
                }
            } catch (error) {
                console.debug("Ожидание бэкенда:", error.message);
            }
        }

        setInterval(fetchGameInfo, 2000);
        fetchGameInfo();

        async function copyTag() {
            const tagElement = document.getElementById('hashtag-text');
            const originalText = '#ОмскШахматнаяСтолица';
            
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(originalText);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = originalText;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }

                tagElement.classList.remove('gradient-tag');
                tagElement.classList.add('text-green-500', 'font-bold');
                tagElement.innerText = '✓ Скопировано!';

                setTimeout(() => {
                    tagElement.classList.remove('text-green-500', 'font-bold');
                    tagElement.classList.add('gradient-tag');
                    tagElement.innerText = originalText;
                }, 2000);

            } catch (err) {
                console.error('Ошибка копирования:', err);
            }
        }

        function downloadPGN() {
            if (!currentPGNString) return alert('Игра еще не началась!');
            const blob = new Blob([currentPGNString], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'gubernator_pmef2026.pgn';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function shareGame() {
            const url = window.location.href;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'ПМЭФ-2026 шахматная партия',
                        text: 'Следите за партией губернатора в прямом эфире! #ОмскШахматнаяСтолица',
                        url: url
                    });
                } catch {}
            } else {
                await navigator.clipboard.writeText(url);
                alert('Ссылка скопирована в буфер обмена');
            }
        }
    </script>
</body>
</html>
